# Buddyline — Supabase CLI configuration
# Reference: https://supabase.com/docs/guides/local-development/cli/config
#
# Linked cloud project ref: manwqkdbajvidgmtrvzy
# (run `supabase link --project-ref manwqkdbajvidgmtrvzy` once to connect)
project_id = "buddyline"

[api]
enabled = true
port = 54321
# Expose the custom `buddyline` schema (not just public) over the Data API.
schemas = ["public", "graphql_public", "buddyline"]
extra_search_path = ["public", "extensions", "buddyline"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
health_timeout = "2m"
# Must match the remote database. Check with `SHOW server_version;` on the
# remote DB and adjust if needed (Supabase cloud default is currently 17).
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.migrations]
# When enabled, migrations in supabase/migrations/ are applied (in filename
# order) during `supabase db push` (cloud) and `supabase db reset` (local).
enabled = true
schema_paths = []

[db.seed]
# Seeds run ONLY on local `supabase db reset` — never on `supabase db push`.
# Production data is therefore never touched by seeding.
enabled = true
sql_paths = ["./seed.sql"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# Local email testing inbox (view "sent" emails at the web UI).
[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Mobile deep-link scheme used by the Expo app for auth callbacks.
site_url = "buddyline://"
additional_redirect_urls = [
  "buddyline://",
  "com.buddyline.app://",
  "https://jackstone02.github.io/buddyline/email-confirmation.html",
  "https://jackstone02.github.io/buddyline/password-reset.html",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 6

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

# Apple Sign-In — configured in the Supabase dashboard for the cloud project.
[auth.external.apple]
enabled = false
secret = "env(SUPABASE_AUTH_EXTERNAL_APPLE_SECRET)"

# Google Sign-In — configured in the Supabase dashboard for the cloud project.
[auth.external.google]
enabled = false
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"
skip_nonce_check = true

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083
deno_version = 2

# Edge function: push-notification sender (see supabase/functions/send-notification).
[functions.send-notification]
enabled = true
